<!DOCTYPE html>
<html>
<head>
    <title>GitHub Activity Tracker</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <h1>Kartik Repository Activity</h1>
    <div id="events"></div>

<script>
let displayedIds = new Set();

async function fetchEvents() {
    const res = await fetch("/events");
    const data = await res.json();

    const container = document.getElementById("events");

    data.forEach(event => {

        if(displayedIds.has(event._id)) return;

        let text = "";

        if (event.type === "PUSH") {
            text = `${event.author} pushed to ${event.to_branch} on ${event.timestamp}`;
        }
        else if (event.type === "PULL_REQUEST") {
            text = `${event.author} submitted a pull request from ${event.from_branch} to ${event.to_branch} on ${event.timestamp}`;
        }
        else if (event.type === "MERGE") {
            text = `${event.author} merged branch ${event.from_branch} to ${event.to_branch} on ${event.timestamp}`;
        }

        const p = document.createElement("p");
        p.textContent = text;
        container.prepend(p);

        displayedIds.add(event._id);
    });
}

fetchEvents();
setInterval(fetchEvents, 15000);
</script>

</body>
</html>
